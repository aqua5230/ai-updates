    function codeBlock(code){const wrap=el("div","log-code-block-wrap");wrap.append(el("pre","log-code-block",code));const btn=el("button","code-copy-btn",COPY[language].copy);btn.type="button";btn.addEventListener("click",()=>{navigator.clipboard.writeText(code).then(()=>{btn.textContent=COPY[language].copied;btn.classList.add("copied");setTimeout(()=>{btn.textContent=COPY[language].copy;btn.classList.remove("copied")},1500)})});wrap.append(btn);return wrap}
    function bodyContent(text){const fragment=document.createDocumentFragment();const fence=/^[ \t]*```[ \t]*\r?\n([\s\S]*?)\r?\n^[ \t]*```[ \t]*(?=\r?$)/gm;let cursor=0;for(const match of text.matchAll(fence)){const prose=text.slice(cursor,match.index).replace(/\r?\n$/,"");if(prose)fragment.append(inlineCode(prose));fragment.append(codeBlock(match[1]));cursor=match.index+match[0].length;if(text.startsWith("\r\n",cursor))cursor+=2;else if(text[cursor]==="\n")cursor+=1}if(cursor<text.length)fragment.append(inlineCode(text.slice(cursor)));return fragment}
    function localized(value){return value&&typeof value==="object"?(value[language]||value.en||value["zh-TW"]||""):""}
    function badgeFor(text){const lower=text.toLowerCase();if(/fix|bug|修|修復|修复|直|해결/.test(lower))return ["fix","bugfix"];if(/perf|效能|性能|省|優化|优化|改善|성능/.test(lower))return ["perf","perf"];return ["new","feature"]}
    function setupLanguage(){const select=document.getElementById("language");LANGUAGES.forEach(item=>{const option=el("option","",item.name);option.value=item.id;select.append(option)});select.value=language;select.addEventListener("change",()=>{language=select.value;localStorage.setItem("ai-updates-language",language);render()})}
    function render(){document.documentElement.lang=language;const t=COPY[language];document.getElementById("subtitle").textContent=t.subtitle;document.getElementById("generated").textContent=`${t.generated.toUpperCase()}: ${data.generated_at}`;document.getElementById("language-label").textContent=`${t.language}: `;document.getElementById("usage-cta-title").textContent=t.usageCtaTitle;document.getElementById("usage-cta-badge").textContent=t.usageCtaBadge;document.getElementById("usage-cta-desc").textContent=t.usageCtaDesc;document.getElementById("usage-cta-link").textContent=t.usageCtaLink;renderSidebar();renderContent()}
    function latestVersion(tool){return tool.versions.find(version=>version.curated)||tool.versions[0]}
    function historyVersions(tool){const latest=latestVersion(tool);return tool.versions.filter(version=>version!==latest)}
    function setHash(toolId,version){history.replaceState(null,"",`#${toolId}${version?`/${version}`:""}`)}
    function parseHash(){let value="";try{value=decodeURIComponent(location.hash.slice(1))}catch(error){return null}if(!value)return null;const [toolId,version,...extra]=value.split("/");if(extra.length||!toolId)return null;const tool=data.tools.find(item=>item.id===toolId);if(!tool||(version&&!tool.versions.some(item=>item.version===version)))return null;return {tool,version}}
    function applyHash(scroll=false){const target=parseHash();if(!target){currentToolId=data.tools[0]?.id||"";expanded=new Set();render();return}currentToolId=target.tool.id;expanded=target.version&&target.version!==latestVersion(target.tool).version?new Set([target.version]):new Set();render();if(scroll&&target.version&&target.version!==latestVersion(target.tool).version)requestAnimationFrame(()=>document.getElementById(`history-${target.version}`)?.scrollIntoView({block:"start"}))}
    function renderSidebar(){const nav=document.getElementById("tool-nav-list");nav.replaceChildren();data.tools.forEach(tool=>{const button=el("button",`tool-item-btn${tool.id===currentToolId?" active":""}`);button.type="button";button.setAttribute("aria-pressed",String(tool.id===currentToolId));button.append(el("span","",tool.name));button.append(el("span","tool-version-lbl",tool.versions[0]?`v${tool.versions[0].version}`:"—"));button.addEventListener("click",()=>{currentToolId=tool.id;expanded=new Set();setHash(tool.id,latestVersion(tool)?.version);render()});nav.append(button)})}
    function terminal(original){const wrap=el("div","terminal-block");const button=el("button","terminal-header");button.type="button";button.setAttribute("aria-expanded","false");button.append(el("span","",COPY[language].original.toUpperCase()));const dots=el("span","terminal-buttons");for(let i=0;i<3;i+=1)dots.append(el("span","terminal-btn-dot"));button.append(dots);const body=el("div","terminal-body",original);body.hidden=true;button.addEventListener("click",()=>{body.hidden=!body.hidden;button.setAttribute("aria-expanded",String(!body.hidden))});wrap.append(button,body);return wrap}
    function itemView(item,isCurated,history=false){const block=el("div",history?"history-item-block":"timeline-version-block");if(!history)block.append(el("span","timeline-node-dot"));const card=history?block:el("article","log-item-card");if(!isCurated)card.append(el("p","review-note",COPY[language].pending.toUpperCase()));const title=isCurated?localized(item.title):item.original;const body=isCurated?localized(item.body):"";const [type,label]=badgeFor(title||"");const header=el("div","log-item-header");header.append(el("span",`log-badge badge-${type}`,label));header.append(el(history?"div":"h3","log-item-title",title));card.append(header);if(body){const bodyNode=el("div","log-item-body");bodyNode.append(bodyContent(body));card.append(bodyNode)}if(isCurated&&item.original)card.append(terminal(item.original));if(!history)block.append(card);return block}
    function versionItems(version){if(version.curated)return {items:version.curated.items||[],curated:true};const raw=version.raw;return {items:raw?(raw.entries||[]).map(original=>({original})):[],curated:false}}
    function shareLabel(platform){const prefix=COPY[language].shareOn;return language==="ja"||language==="ko"?`${platform}${prefix}`:`${prefix} ${platform}`}
    function shareDetails(tool,version){const content=versionItems(version),first=content.items[0]||{},title=content.curated?localized(first.title):first.original||"",text=`${tool.name} ${version.version}\n${title.slice(0,80)}`,url=`${SITE_URL}#${tool.id}/${version.version}`;return {title:`${tool.name} ${version.version}`,text,url}}
    function icon(name){const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");svg.setAttribute("viewBox","0 0 24 24");const path=document.createElementNS("http://www.w3.org/2000/svg","path");path.setAttribute("d",{x:"M5 4l14 16M19 4L5 20",threads:"M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94",facebook:"M14 21v-8h3l.5-3H14V8.5c0-.9.3-1.5 1.6-1.5H18V4.3c-.4-.1-1.4-.3-2.6-.3-2.6 0-4.4 1.6-4.4 4.5V10H8v3h3v8",copy:"M9 9h10v10H9zM15 9V5H5v10h4",system:"M12 16V4M8 8l4-4 4 4M5 14v5h14v-5"}[name]);svg.append(path);return svg}
    function shareButtons(tool,version,small=false){const controls=el("div",`share-controls${small?" share-controls-small":""}`),details=shareDetails(tool,version),open=(url)=>window.open(url,"_blank","noopener");const add=(name,label,action)=>{const button=el("button",`share-button icon-${name}`);button.type="button";button.setAttribute("aria-label",label);button.append(icon(name));button.addEventListener("click",event=>{event.stopPropagation();action()});controls.append(button)};add("x",shareLabel("X"),()=>open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(details.text)}&url=${encodeURIComponent(details.url)}`));add("threads",shareLabel("Threads"),()=>open(`https://www.threads.net/intent/post?text=${encodeURIComponent(`${details.text}\n${details.url}`)}`));add("facebook",shareLabel("Facebook"),()=>open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(details.url)}`));add("copy",COPY[language].copyLink,()=>{const copied=()=>{const status=el("span","copy-status",COPY[language].copied);controls.append(status);setTimeout(()=>status.remove(),1500)};if(navigator.clipboard?.writeText)navigator.clipboard.writeText(details.url).then(copied).catch(()=>window.prompt("",details.url));else window.prompt("",details.url)});if(navigator.share)add("system",COPY[language].share,()=>navigator.share(details).catch(()=>{}));return controls}
    function renderContent(){const container=document.getElementById("active-tool-display");container.replaceChildren();const tool=data.tools.find(item=>item.id===currentToolId);if(!tool||!tool.versions.length){container.append(el("p","status-message",COPY[language].empty));return}const latest=latestVersion(tool),latestData=versionItems(latest),versions=historyVersions(tool);const tagline=el("div","version-tagline");tagline.append(el("span","version-num",`VERSION ${latest.version}`),el("span","latest-indicator",COPY[language].latest),el("span","version-period",(latest.curated||latest.raw||{}).period||""),shareButtons(tool,latest));container.append(tagline);const timeline=el("div","timeline-container");latestData.items.forEach(item=>timeline.append(itemView(item,latestData.curated)));container.append(timeline);const title=el("h2","history-section-title");title.append(el("span","",COPY[language].history));container.append(title);const history=el("div","history-list");if(!versions.length)history.append(el("p","status-message",COPY[language].empty));versions.forEach(version=>history.append(historyCard(tool,version)));container.append(history)}
    function historyCard(tool,version){const open=expanded.has(version.version),card=el("section",`history-accordion-card${open?" expanded":""}`);card.id=`history-${version.version}`;const row=el("div","history-accordion-header-row"),header=el("button","history-accordion-header");header.type="button";header.setAttribute("aria-expanded",String(open));const label=el("span","history-ver-title");label.append(el("span","history-arrow","▶"),el("span","",`Version ${version.version}`));header.append(label,el("span","version-period",(version.curated||version.raw||{}).period||""));const body=el("div","history-accordion-body");body.hidden=!open;const content=versionItems(version);content.items.forEach(item=>body.append(itemView(item,content.curated,true)));header.addEventListener("click",()=>{if(expanded.has(version.version)){expanded.delete(version.version);setHash(tool.id)}else{expanded.add(version.version);setHash(tool.id,version.version)};render()});row.append(header,shareButtons(tool,version,true));card.append(row,body);return card}
    setupLanguage();
    window.addEventListener("hashchange",()=>{if(data)applyHash(true)});
    fetch("data.json").then(response=>{if(!response.ok)throw new Error(`HTTP ${response.status}`);return response.json()}).then(payload=>{data=payload;applyHash(true)}).catch(error=>{console.error(error);document.getElementById("active-tool-display").replaceChildren(el("p","status-message",COPY[language].error))});
  </script>
