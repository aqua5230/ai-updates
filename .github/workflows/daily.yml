name: Daily update

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Fetch official updates
        run: python3 scripts/fetch.py | tee /tmp/ai-updates-new.txt
      - name: Open review issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while read -r marker tool_id version; do
            [ "$marker" = "NEW" ] || continue
            case "$tool_id" in
              claude_code) tool_name="Claude Code" ;;
              codex) tool_name="Codex" ;;
              agy) tool_name="Antigravity" ;;
              usage) tool_name="Usage" ;;
              *) exit 1 ;;
            esac
            gh issue create \
              --title "Review ${tool_name} ${version}" \
              --body "A new official ${tool_name} ${version} changelog was imported. Rewrite and review data/curated/${tool_id}/${version}.json, then merge it to main."
          done < /tmp/ai-updates-new.txt
      - name: Build feeds
        run: python3 scripts/build.py
      - name: Commit changed data
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw ai_updates.json daily.json docs/data.json
          git commit -m "chore: update AI changelogs"
          git push origin HEAD:main
